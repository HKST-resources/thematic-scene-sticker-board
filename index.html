<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼出主題情景</title>
    <style>
        :root {
            --sidebar-width: 250px;
            --primary-blue: #4a90e2;
            --bg-color: #f0f2f5;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'PingFang HK', 'Helvetica Neue', Arial, sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background-color: var(--bg-color);
        }

        /* 側邊欄優化：移除 Header，緊湊佈局 */
        #sidebar {
            width: var(--sidebar-width); background: white;
            border-right: 1px solid #d1d9e6; display: flex;
            flex-direction: column; z-index: 100;
        }

        .compact-controls {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        select {
            width: 100%; padding: 8px; border-radius: 6px;
            border: 1px solid #ddd; font-size: 15px; margin-bottom: 8px;
            background-color: #f9f9f9;
        }

        .button-group {
            display: flex; gap: 5px;
        }

        .btn-sm {
            flex: 1; padding: 6px; border-radius: 6px; border: none;
            font-size: 13px; cursor: pointer; color: white;
            transition: opacity 0.2s;
        }
        .save-btn { background-color: #4CAF50; }
        .clear-btn { background-color: #ff5e5e; }

        /* 增加貼紙欄位空間 */
        #sticker-drawer {
            flex-grow: 1; overflow-y: auto; display: grid;
            grid-template-columns: repeat(2, 1fr); gap: 10px;
            padding: 10px; background: #fafafa;
        }

        .sticker-item {
            width: 100%; aspect-ratio: 1/1; object-fit: contain;
            cursor: pointer; border-radius: 6px; background: white; 
            padding: 3px; box-sizing: border-box; border: 1px solid #eee;
        }

        /* 舞台優化：改為 contain 確保背景不被裁切 */
        #stage {
            flex-grow: 1; position: relative;
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            background-color: #dcdde1; /* 留白處顯示深灰色，方便辨識邊界 */
            overflow: hidden; touch-action: none;
        }

        .placed-item {
            position: absolute; cursor: move; width: 150px;
            user-select: none; touch-action: none;
            transform-origin: center center;
            will-change: transform;
            -webkit-tap-highlight-color: transparent;
        }

        .overlay-info {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.5); padding: 5px 12px;
            border-radius: 15px; font-size: 11px; color: white; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="compact-controls">
        <select id="theme-select" onchange="changeTheme()"></select>
        <div class="button-group">
            <button class="btn-sm save-btn" onclick="saveScene()">儲存</button>
            <button class="btn-sm clear-btn" onclick="clearStage()">清空</button>
        </div>
    </div>
    <div id="sticker-drawer"></div>
</div>

<div id="stage">
    <div class="overlay-info">單指移動 • 雙指縮放 • 雙擊刪除</div>
</div>

<script>
    const themeData = {
        supermarket: { label: "超級市場", items: ["mother", "boy", "cart", "cashier", "supermarket-staff", "meat", "fish", "apple", "biscuit", "milk", "ice-cream", "bread", "noodle"] },
        bedroom: { label: "睡房", items: ["boy", "girl", "bed", "lamp", "wardrobe", "boy-pajama-top", "girl-pajama-top", "boy-pajama-pants", "girl-pajama-pants", "toy-car", "teddy-bear", "toy-box", "clock", "table", "chair", "book"] },
        living_room: { label: "客廳", items: ["sofa", "tv", "toy-box", "toy-car", "teddy-bear", "lego", "table", "chopsticks", "rice", "soup", "fish", "vegetable"] },
        clinic: { label: "診所", items: ["doctor", "nurse", "boy", "mother", "syringe", "pills", "cough-medicine", "thermometer", "face-mask", "band-aid", "cold-pack"] },
        classroom: { label: "課室", items: ["teacher", "boy", "girl", "schoolbag", "car", "legos", "dinosaur", "truck", "sand", "puzzle", "pencil", "eraser", "book", "colour-pencil", "scissors", "drawing-book", "glue-stick", "glue", "tape", "color-paper", "ruler", "sharpener"] },
        playground: { label: "遊樂場", items: ["boy", "girl", "mother", "father", "swings", "slides", "bench", "tree", "water", "climber", "scooter", "bird", "seesaw", "flower", "bicycle", "towel", "football"] },
        transportation: { label: "交通工具", items: ["taxi", "bus", "minibus", "ferry", "mtr", "octopus", "boy-left", "girl-left", "boy-right", "girl-right"] },
        restaurant: { label: "餐廳", items: ["waiter", "menu", "bun", "noodles", "milktea", "egg-tart", "steak", "rice", "spoon", "fork", "chopsticks"] },
        beach: { label: "沙灘", items: ["boy", "girl", "boy-swimsuit", "girl-swimsuit", "swimglasses1", "swimglasses2", "sunglasses", "ball", "slippers", "umbrella", "swimring1", "iced-tea", "watermelon", "bucket", "chair", "shovel", "shell", "starfish", "shell2", "crab", "fish", "turtle", "tree", "sun", "sandcastle", "mat"] },
        forest: { label: "森林", items: ["rabbit", "deer", "owl", "fox", "squirrel", "bear", "tree-log", "mushroom", "boy", "girl", "rock", "flower"] }
    };

    const stage = document.getElementById('stage');
    const drawer = document.getElementById('sticker-drawer');
    const themeSelect = document.getElementById('theme-select');
    let activeSticker = null;

    function init() {
        for (const key in themeData) {
            let opt = document.createElement('option');
            opt.value = key; opt.innerHTML = themeData[key].label;
            themeSelect.appendChild(opt);
        }
        changeTheme();
    }

    function changeTheme() {
        const key = themeSelect.value;
        stage.style.backgroundImage = `url('assets/backgrounds/${key}.jpg')`;
        drawer.innerHTML = '';
        themeData[key].items.forEach(itemName => {
            const img = document.createElement('img');
            img.src = `assets/items/${key}/${itemName}.png`;
            img.className = 'sticker-item';
            img.onclick = () => addToStage(img.src);
            drawer.appendChild(img);
        });
    }

    function addToStage(src) {
        const sticker = document.createElement('img');
        sticker.src = src; sticker.className = 'placed-item';
        sticker.style.left = '50px'; sticker.style.top = '50px';

        let currentScale = 1;
        let initialDist = 0;
        let isDragging = false;
        let startX, startY, initX, initY, lastTap = 0;

        const getDist = (touches) => Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);

        const startAction = (e) => {
            if (e.touches && e.touches.length === 1) {
                const currentTime = new Date().getTime();
                if (currentTime - lastTap < 300) {
                    sticker.remove(); e.preventDefault(); return;
                }
                lastTap = currentTime;
            }
            activeSticker = sticker;
            sticker.style.zIndex = 2000;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            if (e.touches && e.touches.length === 2) {
                isDragging = false; initialDist = getDist(e.touches);
            } else {
                isDragging = true; startX = clientX; startY = clientY;
                initX = sticker.offsetLeft; initY = sticker.offsetTop;
            }
        };

        const onAction = (e) => {
            if (activeSticker !== sticker) return;
            if (e.touches && e.touches.length === 2) {
                const currentDist = getDist(e.touches);
                currentScale = Math.min(Math.max(0.3, currentScale * (currentDist / initialDist)), 4);
                sticker.style.transform = `scale(${currentScale})`;
                initialDist = currentDist;
            } else if (isDragging) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                sticker.style.left = (initX + (clientX - startX)) + 'px';
                sticker.style.top = (initY + (clientY - startY)) + 'px';
            }
        };

        const stopAction = () => {
            if (activeSticker === sticker) {
                isDragging = false; sticker.style.zIndex = 10; activeSticker = null;
            }
        };

        sticker.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchmove', onAction, {passive: false});
        window.addEventListener('touchend', stopAction);
        sticker.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', onAction);
        window.addEventListener('mouseup', stopAction);
        sticker.addEventListener('dblclick', () => sticker.remove());
        stage.appendChild(sticker);
    }

    function clearStage() {
        if(confirm("確定要清空場景嗎？")) {
            document.querySelectorAll('.placed-item').forEach(item => item.remove());
        }
    }

    function saveScene() {
        const info = document.querySelector('.overlay-info');
        info.style.opacity = '0';

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = stage.offsetWidth;
        canvas.height = stage.offsetHeight;

        const bgImg = new Image();
        bgImg.crossOrigin = "anonymous";
        const bgUrl = stage.style.backgroundImage.slice(5, -2).replace(/"/g, "");
        bgImg.src = bgUrl;

        bgImg.onload = () => {
            // 背景繪製邏輯：改為 contain 模式繪製
            const sW = canvas.width, sH = canvas.height;
            const iW = bgImg.width, iH = bgImg.height;
            const ratio = Math.min(sW / iW, sH / iH);
            const dW = iW * ratio, dH = iH * ratio;
            const dX = (sW - dW) / 2, dY = (sH - dH) / 2;

            // 先塗底色（與 CSS 背景色一致）
            ctx.fillStyle = "#dcdde1";
            ctx.fillRect(0, 0, sW, sH);
            // 畫上背景圖
            ctx.drawImage(bgImg, dX, dY, dW, dH);

            const stickers = Array.from(document.querySelectorAll('.placed-item'));
            if (stickers.length === 0) { finalize(canvas); return; }

            let loadedCount = 0;
            stickers.forEach(sticker => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = sticker.src;
                img.onload = () => {
                    const rect = sticker.getBoundingClientRect();
                    const stageRect = stage.getBoundingClientRect();
                    ctx.drawImage(img, rect.left - stageRect.left, rect.top - stageRect.top, rect.width, rect.height);
                    if (++loadedCount === stickers.length) finalize(canvas);
                };
            });
        };

        function finalize(canvas) {
            const link = document.createElement('a');
            const date = new Date().toISOString().slice(0,10);
            link.download = `${date}_${themeData[themeSelect.value].label}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            info.style.opacity = '1';
        }
    }

    init();
</script>
</body>
</html>
